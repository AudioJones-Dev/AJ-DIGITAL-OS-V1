global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: open-webui
    static_configs:
      - targets: ["open-webui:8080"]

  - job_name: vllm
    static_configs:
      - targets: ["host.docker.internal:8000"]

  - job_name: node-exporter
    static_configs:
      - targets: ["host.docker.internal:9100"]

  - job_name: nvidia-dcgm-exporter
    static_configs:
      - targets: ["host.docker.internal:9400"]

  - job_name: ollama-exporter
    static_configs:
      - targets: ["host.docker.internal:9108"]
