global:
  resolve_timeout: 5m

route:
  receiver: n8n-webhook
  group_by: ["alertname", "job", "severity"]
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 4h

receivers:
  - name: n8n-webhook
    webhook_configs:
      - url: http://n8n:5678/webhook/f7a6c123-b7d2-4a24-a959-4720c5a8fbbe/alert-webhook/prometheus-alerts
        send_resolved: true
