groups:
  - name: aj-digital-core-services
    rules:
      - alert: AJServiceProbeDown
        expr: min_over_time(probe_success{job=~"blackbox-http|blackbox-tcp"}[2m]) == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service probe failed for {{ $labels.instance }}"
          description: "Prometheus blackbox probe has failed for at least 2 minutes."

      - alert: AJServiceProbeLatencyHigh
        expr: avg_over_time(probe_duration_seconds{job="blackbox-http"}[5m]) > 2
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High probe latency for {{ $labels.instance }}"
          description: "Average HTTP probe duration is above 2 seconds for 10 minutes."

      - alert: AJScrapeTargetUnavailable
        expr: up{job=~"prometheus|blackbox"} == 0
        for: 2m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Critical monitor target is unavailable"
          description: "Prometheus cannot scrape {{ $labels.job }} target {{ $labels.instance }}."
