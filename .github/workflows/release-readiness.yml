name: Release Readiness

on:
  # Push runs only validate the integration branch post-merge. Feature
  # branches (build/**, docs/**) are covered by their pull_request run, so
  # triggering push there too would create a second, redundant run whose
  # github.ref differs from the PR's (refs/heads/... vs refs/pull/N/merge),
  # defeating the concurrency group below and doubling flaky-network exposure.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'build/**'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: release-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-readiness:
    name: typecheck-test-build-smoke-pack
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: CLI smoke
        run: npm run smoke

      - name: Package dry run
        run: npm pack --dry-run

  crm-rls-isolation:
    name: crm-rls-isolation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CRM RLS isolation proof
        env:
          CRM_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: npm run test:crm-rls
