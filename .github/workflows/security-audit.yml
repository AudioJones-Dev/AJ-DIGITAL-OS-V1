name: Security Audit

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Full report for visibility — never blocks the build on transitive or
      # dev-tooling advisories (these created a merge deadlock: each Dependabot
      # PR fixes one package while `npm audit` keeps failing on the rest).
      - name: npm audit (full report, non-blocking)
        run: npm audit || true

      # Hard gate: only fail on high+ vulnerabilities in PRODUCTION dependencies.
      - name: Fail on high+ production vulnerabilities
        run: npm audit --omit=dev --audit-level=high
