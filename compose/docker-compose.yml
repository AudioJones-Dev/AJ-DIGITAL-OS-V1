name: aj-digital-infra

services:
  ollama:
    image: ollama/ollama:latest
    container_name: aj-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - "F:/CACHE/ollama:/root/.ollama"
    restart: unless-stopped
    networks:
      - aj-digital-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: aj-open-webui
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - "F:/CACHE/open-webui:/app/backend/data"
    healthcheck:
      test: ["CMD-SHELL", "curl --silent --fail http://127.0.0.1:8080/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - aj-digital-net

  postgres:
    image: postgres:16
    container_name: aj-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - "F:/CACHE/postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - aj-digital-net

  redis:
    image: redis:7
    container_name: aj-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - "F:/CACHE/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - aj-digital-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aj-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - "F:/CACHE/qdrant:/qdrant/storage"
    restart: unless-stopped
    networks:
      - aj-digital-net

  n8n:
    image: n8nio/n8n:latest
    container_name: aj-n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
    volumes:
      - "F:/CACHE/n8n:/home/node/.n8n"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aj-digital-net

  prometheus:
    image: prom/prometheus:latest
    container_name: aj-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - "F:/CACHE/prometheus:/prometheus"
      - "../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
    restart: unless-stopped
    networks:
      - aj-digital-net

  loki:
    image: grafana/loki:latest
    container_name: aj-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - "F:/CACHE/loki:/loki"
    restart: unless-stopped
    networks:
      - aj-digital-net

  grafana:
    image: grafana/grafana:latest
    container_name: aj-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - "F:/CACHE/grafana:/var/lib/grafana"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - aj-digital-net

networks:
  aj-digital-net:
    name: aj-digital-net
    driver: bridge
