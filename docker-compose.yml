# AJ Digital OS — Docker Compose (production + ops stack)
services:
  aj-digital-os:
    build: .
    restart: unless-stopped
    ports:
      - "7420:7420"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - HERMES_BIND_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:7420/status').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Ops Stack ───────────────────────────────────────────────────

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "${OPENWEBUI_PORT:-3001}:8080"
    environment:
      WEBUI_AUTH: "True"
      ENABLE_SIGNUP: "False"
      ENABLE_OTEL: "true"
      ENABLE_OTEL_TRACES: "true"
      ENABLE_OTEL_METRICS: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SERVICE_NAME: "open-webui"
      OPENAI_API_BASE_URL: "${HERMES_API_BASE_URL:-http://host.docker.internal:8642/v1}"
      OPENAI_API_KEY: "${HERMES_API_KEY:-change-me}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-change-me}"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./ops/grafana/provisioning:/etc/grafana/provisioning
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "${OTEL_PORT:-4317}:4317"
    volumes:
      - ./ops/otel/config.yaml:/etc/otelcol/config.yaml:ro
    restart: unless-stopped

volumes:
  openwebui-data:
  grafana-data:
  prometheus-data:
